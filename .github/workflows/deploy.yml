name: Deploy Sensores App

on:
  push:
    branches: ["main"] # Se activa cuando subes cambios a la rama 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar mi código
        uses: actions/checkout@v4

      - name: 2. Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 3. Construir y subir la imagen
        run: |
          # Cambia 'tu-usuario' por tu nombre real de Docker Hub
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/backend-sensores:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/backend-sensores:latest

      - name: 4. Conectarse a Kubernetes
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: 5. Aplicar cambios en el clúster
        run: |
          kubectl apply -f postgres-db.yaml
          kubectl apply -f proyecto-sensores.yaml
